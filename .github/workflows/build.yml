name: build

on:
  push:
  pull_request:

jobs:
  android-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=android,linux .

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Linux desktop
        run: flutter build linux --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-prism-android-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-prism-linux
          path: build/linux/x64/release/bundle/**

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=windows .

      - name: Build Windows desktop
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-prism-windows
          path: build/windows/x64/runner/Release/**

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=macos .

      - name: Build macOS desktop
        run: flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-prism-macos
          path: build/macos/Build/Products/Release/*.app
