name: build

on:
  push:
  pull_request:

jobs:
  flutter:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test
      - name: Build Android APK
        if: matrix.target == 'apk'
        run: flutter build apk --release
      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release
      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release
      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release
