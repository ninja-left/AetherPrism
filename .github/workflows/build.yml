name: build-and-release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ANDROID_APPLICATION_ID: io.github.aetherprism
  ANDROID_NAMESPACE: io.github.aetherprism
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run_build: ${{ steps.check.outputs.run_build }}
    steps:
      - id: check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.title }}" =~ ^Update\ v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> $"GITHUB_OUTPUT"
          fi
  flutter:
    needs: gate
    if: needs.gate.outputs.run_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: apk
            asset_name: AetherPrism-android-universal.apk
          - os: ubuntu-latest
            target: linux
            asset_name: AetherPrism-linux-x64.tar.xz
          - os: windows-latest
            target: windows
            asset_name: AetherPrism-windows-x64.zip
          - os: macos-latest
            target: macos
            asset_name: AetherPrism-macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        id: flutter
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Cache Gradle
        if: matrix.target == 'apk'
        uses: actions/cache@v5.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle*') }}
          restore-keys: |
            $${{ runner.os }}-gradle-

      - run: flutter pub get

      - name: Generate platform folders
        run: flutter create --platforms=android,linux,windows,macos .

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Configure Android identity and signing
        if: matrix.target == 'apk'
        shell: bash
        run: |
          python3 tool/ci/configure_android.py

      - name: Copy Linux app icon
        if: matrix.target == 'linux'
        shell: bash
        run: |
          install -Dm644 assets/icons/app_icon.png linux/runner/resources/app_icon.png

      - name: Install Linux desktop dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libstdc++-12-dev

      - run: flutter test

      - name: Build Android package
        if: matrix.target == 'apk'
        shell: bash
        run: |
          mkdir -p release-assets
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
              echo "Missing Android signing secrets. Set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD in GitHub Secrets."
              exit 1
            fi
            flutter build apk --release
            cp build/app/outputs/flutter-apk/app-release.apk "release-assets/${{ matrix.asset_name }}"

            flutter build apk --release --split-per-abi
            for file in build/app/outputs/flutter-apk/app-*-release.apk; do
              [ -e "$file" ] || continue
              base="$(basename "$file")"
              abi="${base#app-}"
              abi="${abi%-release.apk}"
              cp "$file" "release-assets/AetherPrism-android-${abi}.apk"
            done
          else
            flutter build apk --debug
            cp build/app/outputs/flutter-apk/app-debug.apk "release-assets/AetherPrism-android-debug.apk"
          fi

      - name: Build Linux
        if: matrix.target == 'linux'
        run: flutter build linux --release

      - name: Stage Linux artifact
        if: matrix.target == 'linux'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -cJf "release-assets/${{ matrix.asset_name }}" -C build/linux/x64/release/bundle .

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release

      - name: Stage Windows artifact
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "release-assets\${{ matrix.asset_name }}"

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Stage macOS artifact
        if: matrix.target == 'macos'
        shell: bash
        run: |
          mkdir -p release-assets
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No macOS app bundle found"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release-assets/**/*
          if-no-files-found: error

  release:
    needs: flutter
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: release_version
        shell: bash
        run: |
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Build release notes
        shell: bash
        run: |
          {
            echo "# Aether Prism v${{ steps.release_version.outputs.version }}"
            echo
            awk '
              /^##[[:space:]]/ {
                if (seen) exit
                seen=1
              }
              seen { print }
            ' CHANGELOG.md
            echo
            echo "SHA-256:"
            echo
            find release-assets -type f | sort | while read -r file; do
              sha256="$(sha256sum "$file" | awk '{print $1}')"
              printf '%s  %s\n' "$sha256" "$(basename "$file")"
            done
          } > release-notes.md

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_version.outputs.version }}
          name: v${{ steps.release_version.outputs.version }}
          prerelease: true
          body_path: release-notes.md
          files: release-assets/**/*
