name: aetherprism
description: Unofficial GUI wrapper for the Aether core.
publish_to: "none"
version: 1.0.7+7
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#070707"
  adaptive_icon_foreground: assets/icons/app_icon.png
  min_sdk_android: 21
  windows:
    generate: true
    image_path: assets/icons/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icons/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/runtime/
